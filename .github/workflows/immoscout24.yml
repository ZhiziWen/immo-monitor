name: Check ImmobilienScout24 Listings

on:
  workflow_dispatch:           # manual trigger only (IS24 blocks automated scraping)

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && playwright install chromium --with-deps

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python immoscout24.py

      - name: Save updated seen_immoscout24.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_immoscout24.json
          git diff --staged --quiet || git commit -m "chore: update seen listings [skip ci]"
          git pull --rebase && git push
